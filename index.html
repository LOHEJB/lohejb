<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的App</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #0f1115;
      color: #fff;
    }

    /* 顶部栏 */
    .header {
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      background: #151823;
      position: sticky;
      top: 0;
    }

    /* 卡片容器 */
    .container {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    /* App卡片 */
    .card {
      background: #1b2030;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
      transition: 0.2s;
    }

    .card:active {
      transform: scale(0.98);
    }

    .title {
      font-size: 16px;
      font-weight: 600;
    }

    .desc {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 6px;
    }

    /* 底部导航 */
    .tabbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #151823;
      padding: 10px 0;
    }

    .tab {
      font-size: 12px;
      opacity: 0.7;
    }

    .tab.active {
      opacity: 1;
      color: #4da3ff;
    }
  </style>
</head>

<body>

  <div class="header">我的App</div>

  <div class="container">
    <div class="card">
      <div class="title">🎬 观影记录</div>
      <div class="desc">记录你看过的电影和评分</div>
    </div>

    <div class="card">
      <div class="title">📷 作品集</div>
      <div class="desc">摄影 / 项目 / 创作整理</div>
    </div>

    <div class="card">
      <div class="title">🚴 骑行记录</div>
      <div class="desc">距离、路线、身体状态</div>
    </div>

    <div class="card">
      <div class="title">📝 日记</div>
      <div class="desc">轻量记录每天的想法</div>
    </div>
  </div>

  <div class="tabbar">
    <div class="tab active">首页</div>
    <div class="tab">记录</div>
    <div class="tab">我的</div>
  </div>

</body>
</html>
